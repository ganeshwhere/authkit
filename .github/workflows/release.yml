name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docs-and-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify docs tree
        run: |
          test -d docs
          find docs -name '*.mdx' | sort

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/authkit

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate
      - docs-and-helm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build release artifacts
        run: pnpm build

      - name: Package Helm chart
        run: helm package deploy/helm/authkit --destination dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: authkit-release
          path: |
            dist
