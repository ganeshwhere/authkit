apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authkit.fullname" . }}-secret
  labels:
    {{- include "authkit.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  JWT_PRIVATE_KEY: {{ .Values.secrets.jwtPrivateKey | quote }}
  JWT_PUBLIC_KEY: {{ .Values.secrets.jwtPublicKey | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  HMAC_SECRET: {{ .Values.secrets.hmacSecret | quote }}
